# Gemini CLI custom command: /software-house
# See https://geminicli.com/docs/extensions/reference/

[command]
name = "software-house"
description = "Run the user's computer like a software house company"

[command.usage]
text = "/software-house <subcommand> [args]"
example = "/software-house list"

# Phase 1 -- Foundation (read-only + init)

[[command.subcommands]]
name = "init"
description = "Bootstrap company state at ~/.software-house/"
risk_tier = 2

[[command.subcommands]]
name = "list"
description = "List people, teams, departments, or the freelance pool"
risk_tier = 1

[[command.subcommands]]
name = "show"
description = "Display one entity (employee, team, department) in detail"
risk_tier = 1

[[command.subcommands]]
name = "org-chart"
description = "Render an ASCII tree of the company hierarchy"
risk_tier = 1

[[command.subcommands]]
name = "lint"
description = "Check the company state for structural problems"
risk_tier = 1

# Reading order on first invocation:
#   1. policies/privacy.md
#   2. policies/safety.md
#   3. operations/_shared.md
#   4. operations/<subcommand>.md

# Critical constraints (mirrors SKILL.md C1-C4):
#   C1. Skill operations never send data off the machine.
#   C2. Agents using external providers require typed EGRESS-CONSENT-<provider>.
#   C3. Tier-4 destructive ops require typed CONFIRM <subject>, even with --yolo.
#   C4. Every state-modifying op writes one JSONL line to the audit log.
