# Gemini CLI custom command: /software-house
# See https://geminicli.com/docs/extensions/reference/

[command]
name = "software-house"
description = "Run the user's computer like a software house company"

[command.usage]
text = "/software-house <subcommand> [args]"
example = "/software-house list"

# Phase 1 -- Foundation (read-only + init)

[[command.subcommands]]
name = "init"
description = "Bootstrap company state at ~/.software-house/"
risk_tier = 2

[[command.subcommands]]
name = "list"
description = "List people, teams, departments, or the freelance pool"
risk_tier = 1

[[command.subcommands]]
name = "show"
description = "Display one entity (employee, team, department) in detail"
risk_tier = 1

[[command.subcommands]]
name = "org-chart"
description = "Render an ASCII tree of the company hierarchy"
risk_tier = 1

[[command.subcommands]]
name = "lint"
description = "Check the company state for structural problems"
risk_tier = 1

# Phase 2 -- Recruitment

[[command.subcommands]]
name = "hire"
description = "Create a new agent with provider/model/effort + egress consent gate"
risk_tier = 2

[[command.subcommands]]
name = "onboard"
description = "Run onboarding checklist for a new agent"
risk_tier = 2

[[command.subcommands]]
name = "fire"
description = "Remove an agent (two-step typed CONFIRM, archive not delete)"
risk_tier = 4

[[command.subcommands]]
name = "dept"
description = "Department operations: create, assign"
risk_tier = 2

# Phase 3 -- Mobility & Outsource

[[command.subcommands]]
name = "transfer"
description = "Transfer an agent to another team"
risk_tier = 3

[[command.subcommands]]
name = "second"
description = "Matrix-assign an agent to a second team"
risk_tier = 3

[[command.subcommands]]
name = "promote"
description = "Increase an agent's level and optionally change role"
risk_tier = 3

[[command.subcommands]]
name = "demote"
description = "Decrease an agent's level and optionally change role"
risk_tier = 3

[[command.subcommands]]
name = "set-model"
description = "Change agent's provider/model/effort (egress re-consent if external)"
risk_tier = 3

[[command.subcommands]]
name = "outsource"
description = "Outsource operations: hire freelance agent"
risk_tier = 2

[[command.subcommands]]
name = "contract"
description = "Contract a freelance agent to a project team"
risk_tier = 3

[[command.subcommands]]
name = "off-board"
description = "Run off-boarding checklist before removal"
risk_tier = 3

[[command.subcommands]]
name = "disband"
description = "Remove an entire team (two-step typed CONFIRM)"
risk_tier = 4

# Phase 4 -- OKR & Gamification

[[command.subcommands]]
name = "okr"
description = "OKR operations: set, review"
risk_tier = 2

[[command.subcommands]]
name = "award-xp"
description = "Grant XP and trigger level/achievement checks"
risk_tier = 3

[[command.subcommands]]
name = "dashboard"
description = "Show gamification stats and skill-tree state"
risk_tier = 1

# Reading order on first invocation:
#   1. policies/privacy.md
#   2. policies/safety.md
#   3. operations/_shared.md
#   4. operations/<subcommand>.md

# Critical constraints (mirrors SKILL.md C1-C4):
#   C1. Skill operations never send data off the machine.
#   C2. Agents using external providers require typed EGRESS-CONSENT-<provider>.
#   C3. Tier-4 destructive ops require typed CONFIRM <subject>, even with --yolo.
#   C4. Every state-modifying op writes one JSONL line to the audit log.
